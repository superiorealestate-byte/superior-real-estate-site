<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>New Deal — Deal Desk</title>
</head>
<body style="margin:0;padding:0;background:#060608;font-family:'Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased;">

<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#060608;padding:40px 20px;">
  <tr>
    <td align="center">
      <table width="580" cellpadding="0" cellspacing="0" border="0" style="max-width:580px;width:100%;">

        <!-- HEADER -->
        <tr>
          <td style="padding-bottom:32px;border-bottom:1px solid #1A1A20;">
            <table width="100%" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td>
                  <p style="margin:0;font-size:18px;font-weight:400;letter-spacing:.22em;color:#C9A96E;font-family:Georgia,'Times New Roman',serif;">SUPERIOR</p>
                  <p style="margin:4px 0 0;font-size:8px;font-weight:400;letter-spacing:.28em;color:#5C574F;text-transform:uppercase;">Real Estate · Deal Desk</p>
                </td>
                <td align="right">
                  <span style="display:inline-block;font-size:9px;font-weight:400;letter-spacing:.2em;text-transform:uppercase;color:#5C574F;border:1px solid #1A1A20;padding:5px 10px;">Confidential</span>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- ALERT BADGE -->
        <tr>
          <td style="padding-top:36px;padding-bottom:8px;">
            <span style="display:inline-block;font-size:9px;font-weight:500;letter-spacing:.3em;text-transform:uppercase;color:#C9A96E;">New Deal Submission</span>
          </td>
        </tr>

        <!-- TITLE -->
        <tr>
          <td style="padding-bottom:8px;">
            <h1 style="margin:0;font-family:Georgia,'Times New Roman',serif;font-size:38px;font-weight:400;font-style:italic;color:#FFFFFF;line-height:1.1;">{{ASSET_TYPE}}</h1>
          </td>
        </tr>

        <!-- MARKET TAG -->
        <tr>
          <td style="padding-bottom:32px;">
            <p style="margin:0;font-size:13px;font-weight:300;color:#9C9488;letter-spacing:.08em;">{{MARKET}} &nbsp;·&nbsp; {{STAGE}}</p>
          </td>
        </tr>

        <!-- GOLD LINE -->
        <tr>
          <td style="padding-bottom:32px;">
            <table width="100%" cellpadding="0" cellspacing="0"><tr>
              <td style="height:1px;background:linear-gradient(to right,transparent,#C9A96E 40%,#C9A96E 60%,transparent);"></td>
            </tr></table>
          </td>
        </tr>

        <!-- KEY DATA -->
        <tr>
          <td style="padding-bottom:32px;">
            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#0C0C0F;border:1px solid #1A1A20;">
              <tr>
                <td style="padding:20px 24px;border-bottom:1px solid #1A1A20;">
                  <table width="100%" cellpadding="0" cellspacing="0">
                    <tr>
                      <td style="font-size:9px;font-weight:400;letter-spacing:.22em;text-transform:uppercase;color:#5C574F;">Price Range</td>
                      <td align="right" style="font-size:14px;font-weight:400;color:#F0EBE0;letter-spacing:.04em;">{{PRICE_RANGE}}</td>
                    </tr>
                  </table>
                </td>
              </tr>
              <tr>
                <td style="padding:20px 24px;border-bottom:1px solid #1A1A20;">
                  <table width="100%" cellpadding="0" cellspacing="0">
                    <tr>
                      <td style="font-size:9px;font-weight:400;letter-spacing:.22em;text-transform:uppercase;color:#5C574F;">NDA</td>
                      <td align="right" style="font-size:14px;font-weight:400;color:#F0EBE0;">{{NDA}}</td>
                    </tr>
                  </table>
                </td>
              </tr>
              <tr>
                <td style="padding:20px 24px;border-bottom:1px solid #1A1A20;">
                  <table width="100%" cellpadding="0" cellspacing="0">
                    <tr>
                      <td style="font-size:9px;font-weight:400;letter-spacing:.22em;text-transform:uppercase;color:#5C574F;">Timeline</td>
                      <td align="right" style="font-size:14px;font-weight:400;color:#F0EBE0;">{{TIMELINE}}</td>
                    </tr>
                  </table>
                </td>
              </tr>
              <tr>
                <td style="padding:20px 24px;">
                  <table width="100%" cellpadding="0" cellspacing="0">
                    <tr>
                      <td style="font-size:9px;font-weight:400;letter-spacing:.22em;text-transform:uppercase;color:#5C574F;">Contact</td>
                      <td align="right" style="font-size:14px;font-weight:400;color:#C9A96E;">{{CONTACT}}</td>
                    </tr>
                  </table>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- DESCRIPTION -->
        <tr>
          <td style="padding-bottom:32px;">
            <p style="margin:0 0 10px;font-size:9px;font-weight:400;letter-spacing:.25em;text-transform:uppercase;color:#5C574F;">Description</p>
            <p style="margin:0;font-size:13px;font-weight:300;line-height:1.8;color:#9C9488;">{{DESCRIPTION}}</p>
          </td>
        </tr>

        <!-- CTA -->
        <tr>
          <td style="padding-bottom:40px;">
            <table cellpadding="0" cellspacing="0">
              <tr>
                <td>
                  <a href="https://app.notion.com/p/493ed762a9564b668705a765e19fec45" style="display:inline-block;padding:14px 28px;background:transparent;border:1px solid rgba(201,169,110,.5);color:#C9A96E;font-family:'Helvetica Neue',Arial,sans-serif;font-size:10px;font-weight:400;letter-spacing:.22em;text-transform:uppercase;text-decoration:none;">Open in Notion →</a>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- DIVIDER -->
        <tr>
          <td style="border-top:1px solid #1A1A20;padding-top:24px;padding-bottom:0;">
            <table width="100%" cellpadding="0" cellspacing="0">
              <tr>
                <td style="font-size:10px;font-weight:300;color:#5C574F;letter-spacing:.1em;">Superior Real Estate · Deal Desk</td>
                <td align="right" style="font-size:10px;font-weight:300;color:#5C574F;letter-spacing:.1em;">Beyond the Deal.</td>
              </tr>
            </table>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>

</body>
</html>
